plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

javafx {
    version = '21'
    modules = ['javafx.controls', 'javafx.fxml']
}

dependencies {
    implementation project(':common-lib')

    // SLF4J for logging
    implementation 'org.slf4j:slf4j-api:2.0.9'
    implementation 'org.slf4j:slf4j-simple:2.0.9'
}

application {
    mainClass = 'org.example.LoadBalancer'
}

// Task to run Load Balancer WITH Admin Dashboard UI
tasks.register('runAdmin', JavaExec) {
    group = 'application'
    description = 'Run Load Balancer WITH Admin Dashboard'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'org.example.admin.LBAdminLauncher'
}

jar {
    manifest {
        attributes 'Main-Class': 'org.example.LoadBalancer'
    }
}
