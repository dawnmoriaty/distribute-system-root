# =====================================================
# NHANH: main ? Worker Server Configuration
# =====================================================
# Chay: docker-compose up -d (MySQL + phpMyAdmin)
# Chay: RUN.bat 9001 hoac RUN.bat 9002
# =====================================================

# ============== HUONG DAN CAU HINH LAN (LAN CONFIG) ==============
# De ket noi cac may trong mang LAN (Wi-Fi/Ethernet):
# 1. Tren may chu (Server/LB), mo CMD go: ipconfig
# 2. Tim "IPv4 Address", vi du: 192.168.1.10
# 3. Thay the "localhost" bang IP do o cac dong duoi day tren tat ca cac may.
# Luu y: Dam bao Firewall (Tuong lua) cho phep Java va Port (8080, 9001, 3306).
# =================================================================

# =====================================================
# MO HINH 4 MAY (RECOMMENDED)
# MAY 1 (Host - 192.168.137.152): Database + Load Balancer + Worker 1
# MAY 2: Worker 2
# MAY 3: Client 1
# MAY 4: Client 2
# =====================================================

# ============== LOAD BALANCER ==============
# IP cua MAY 1
LOAD_BALANCER_HOST=192.168.137.152
LOAD_BALANCER_PORT=8080

# ============== WORKER SERVERS ==============
# Worker 1 chay tren MAY 1 (Host)
WORKER1_HOST=192.168.137.152
WORKER1_PORT=9001

# Worker 2 chay tren MAY 2
# (!) BAN CAN SUA IP DUOI DAY THANH IP CUA MAY 2
WORKER2_HOST=192.168.137.16
WORKER2_PORT=9002

# ============== DATABASE ==============
# Quan trong: Phai dung IP LAN (MAY 1) de Worker 2 o xa co the ket noi duoc
DB_URL=jdbc:mysql://192.168.137.152:3306/distributed_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
DB_USER=root
DB_PASSWORD=password

# ============== ACCESS CONTROL (TCP Connection ACL) ==============
# Approval mode: AUTO (use whitelist/blacklist) or MANUAL (admin approves each connection)
# ACL_APPROVAL_MODE=AUTO
# Timeout for manual approval in milliseconds (default: 30000 = 30 seconds)
# ACL_MANUAL_TIMEOUT_MS=30000
# Whitelist/Blacklist are managed dynamically from Admin Dashboard UI
# and persisted to acl.properties automatically

