# =====================================================
# LOCAL DEVELOPMENT CONFIGURATION (v?i Docker MySQL)
# =====================================================
# Ch?y: docker-compose up -d
# =====================================================

# ============== LOAD BALANCER ==============
LOAD_BALANCER_HOST=localhost
LOAD_BALANCER_PORT=8080

# ============== WORKER SERVERS ==============
WORKER1_HOST=localhost
WORKER1_PORT=9001

WORKER2_HOST=localhost
WORKER2_PORT=9002

# ============== DATABASE (Docker MySQL) ==============
DB_URL=jdbc:mysql://localhost:3306/distributed_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
DB_USER=root
DB_PASSWORD=password

# ============== ACCESS CONTROL (TCP Connection ACL) ==============
# Approval mode: AUTO (use whitelist/blacklist) or MANUAL (admin approves each connection)
# ACL_APPROVAL_MODE=AUTO
# Timeout for manual approval in milliseconds (default: 30000 = 30 seconds)
# ACL_MANUAL_TIMEOUT_MS=30000
# Whitelist/Blacklist are managed dynamically from Admin Dashboard UI
# and persisted to acl.properties automatically

